<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrafficAI Login</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --accent-1: #22d3ee;
      --accent-2: #6366f1;
      --accent-3: #10b981;
      --text-main: #e2e8f0;
      --text-soft: #94a3b8;
      --danger: #f87171;
      --success: #34d399;
      --card: rgba(15, 23, 42, 0.58);
      --card-border: rgba(148, 163, 184, 0.25);
      --input: rgba(15, 23, 42, 0.68);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(1000px 500px at 15% 10%, rgba(34, 211, 238, 0.18), transparent 55%),
        radial-gradient(900px 520px at 90% 85%, rgba(99, 102, 241, 0.2), transparent 60%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(2px);
      z-index: 0;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
      opacity: 0.35;
    }

    .blob.one {
      width: 230px;
      height: 230px;
      top: 8%;
      left: 8%;
      background: radial-gradient(circle at 30% 30%, #22d3ee, #0ea5e9);
    }

    .blob.two {
      width: 260px;
      height: 260px;
      right: 6%;
      bottom: 10%;
      background: radial-gradient(circle at 30% 30%, #818cf8, #6366f1);
      animation-delay: 0.8s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    .login-wrap {
      position: relative;
      z-index: 2;
      width: min(560px, 92vw);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 70px rgba(2, 6, 23, 0.55);
      padding: 30px 26px 24px;
      animation: rise 420ms ease-out;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .brand .icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      box-shadow: 0 10px 24px rgba(56, 189, 248, 0.3);
      font-size: 19px;
    }

    .brand h1 {
      font-size: 24px;
      letter-spacing: 0.2px;
      font-weight: 800;
    }

    .subtitle {
      color: var(--text-soft);
      margin-bottom: 20px;
      font-size: 14px;
    }

    .row {
      margin-top: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .input-shell {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(100, 116, 139, 0.5);
      background: var(--input);
      border-radius: 14px;
      padding: 0 12px;
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    .input-shell:focus-within {
      border-color: rgba(34, 211, 238, 0.9);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
      transform: translateY(-1px);
    }

    .input-shell span {
      color: #94a3b8;
      font-size: 14px;
      width: 18px;
      text-align: center;
      flex: 0 0 18px;
    }

    input {
      width: 100%;
      background: transparent;
      border: 0;
      outline: 0;
      color: #e2e8f0;
      font-size: 14px;
      height: 44px;
    }

    input::placeholder {
      color: #64748b;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-primary {
      width: 100%;
      border: 0;
      height: 46px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 15px;
      color: white;
      background: linear-gradient(135deg, var(--accent-2), var(--accent-1));
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
      box-shadow: 0 12px 26px rgba(99, 102, 241, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(56, 189, 248, 0.35);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .row-meta {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .link-btn {
      border: 0;
      background: transparent;
      color: #a5f3fc;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 0;
      text-decoration: none;
    }

    .link-btn:hover {
      color: #67e8f9;
    }

    .toggle-line {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-soft);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .meta {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
      color: var(--text-soft);
    }

    .meta.error { color: var(--danger); }
    .meta.success { color: var(--success); }

    .hidden {
      display: none;
    }

    @media (max-width: 640px) {
      .login-wrap {
        padding: 22px 16px 18px;
        border-radius: 20px;
      }
      .brand h1 {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <div class="blob one"></div>
  <div class="blob two"></div>

  <main class="login-wrap">
    <div class="brand">
      <div class="icon">&#x1F6A6;</div>
      <h1>TrafficAI</h1>
    </div>
    <p id="form-subtitle" class="subtitle">Sign in for secure route intelligence.</p>

    <div class="row">
      <label for="username">Username</label>
      <div class="input-shell">
        <span>@</span>
        <input id="username" type="text" autocomplete="username" placeholder="Enter username" required>
      </div>
    </div>

    <div class="row">
      <label for="password">Password</label>
      <div class="input-shell">
        <span>&#x1F512;</span>
        <input id="password" type="password" autocomplete="current-password" placeholder="Enter password" required>
      </div>
    </div>

    <div id="phone-row" class="row hidden">
      <label for="phone">Phone Number</label>
      <div class="input-shell">
        <span>&#x260E;</span>
        <input id="phone" type="tel" autocomplete="tel" placeholder="Enter phone number">
      </div>
    </div>

    <div class="row-meta">
      <a id="forgot-link" class="link-btn" href="#">Forgot Password?</a>
    </div>

    <div class="actions">
      <button id="submit-btn" class="btn-primary" type="button">Login</button>
    </div>

    <div class="toggle-line">
      <span id="toggle-prefix">New to TrafficAI?</span>
      <button id="mode-toggle" class="link-btn" type="button">Sign Up</button>
    </div>

    <p id="status" class="meta">Use your credentials to continue.</p>
  </main>

  <script src="config/private-config.js"></script>
  <script>
    const AUTH_FLAG_KEY = "loggedIn";
    const AUTH_TOKEN_KEY = "trafficai_admin_token";
    const AUTH_EMAIL_KEY = "trafficai_admin_email";
    const AUTH_ROLE_KEY = "trafficai_user_role";

    const privateConfig = window.TRAFFICAI_PRIVATE_CONFIG || {};
    const configuredApiCandidates = Array.isArray(privateConfig.apiBaseCandidates)
      ? privateConfig.apiBaseCandidates
      : ["/api", "http://localhost:8080/api", "http://127.0.0.1:8080/api"];

    const loginPagePath = privateConfig.loginPagePath || "loged.html";
    const userPortalPath = privateConfig.userPortalPath || "user-dashboard.html";
    const adminPortalPath = privateConfig.adminPortalPath || "admin-portal.html";
    const userPortalRoute = privateConfig.userPortalRoute || "/user-dashboard";
    const adminPortalRoute = privateConfig.adminPortalRoute || "/admin-portal";

    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const phoneInput = document.getElementById("phone");
    const phoneRow = document.getElementById("phone-row");
    const statusEl = document.getElementById("status");
    const subtitleEl = document.getElementById("form-subtitle");
    const togglePrefixEl = document.getElementById("toggle-prefix");
    const toggleBtn = document.getElementById("mode-toggle");
    const submitBtn = document.getElementById("submit-btn");
    const forgotLink = document.getElementById("forgot-link");

    let activeApiBase = "";
    let signupMode = false;

    function setStatus(message, type = "info") {
      statusEl.className = `meta ${type}`;
      statusEl.textContent = message;
    }

    function decodeJwtPayload(token) {
      if (!token) return null;
      const parts = String(token).split(".");
      if (parts.length < 2) return null;
      try {
        const normalized = parts[1].replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=");
        return JSON.parse(atob(padded));
      } catch (_error) {
        return null;
      }
    }

    function normalizeApiBase(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      if (raw.startsWith("/")) return raw.replace(/\/+$/, "");
      if (!/^https?:\/\//i.test(raw)) return "";
      try {
        const parsed = new URL(raw);
        return `${parsed.protocol}//${parsed.host}${parsed.pathname}`.replace(/\/+$/, "");
      } catch (_error) {
        return "";
      }
    }

    function buildApiCandidates() {
      const candidates = [...configuredApiCandidates];

      if (/^https?:$/i.test(window.location.protocol) && window.location.origin) {
        candidates.push(`${window.location.origin}/api`);
      }

      [8080, 3000, 3001].forEach((port) => {
        candidates.push(`http://localhost:${port}/api`);
        candidates.push(`http://127.0.0.1:${port}/api`);
      });

      return [...new Set(candidates.map(normalizeApiBase).filter(Boolean))];
    }

    function getRoleFromStorage() {
      try {
        return (localStorage.getItem(AUTH_ROLE_KEY) || sessionStorage.getItem(AUTH_ROLE_KEY) || "").toLowerCase();
      } catch (_error) {
        return "";
      }
    }

    function getStoredToken() {
      try {
        return localStorage.getItem(AUTH_TOKEN_KEY) || sessionStorage.getItem(AUTH_TOKEN_KEY) || "";
      } catch (_error) {
        return "";
      }
    }

    function clearAuthSession() {
      [localStorage, sessionStorage].forEach((store) => {
        try {
          store.removeItem(AUTH_FLAG_KEY);
          store.removeItem(AUTH_TOKEN_KEY);
          store.removeItem(AUTH_EMAIL_KEY);
          store.removeItem(AUTH_ROLE_KEY);
        } catch (_error) {
          // Ignore storage clear failures.
        }
      });
    }

    function shouldUseRoutePaths() {
      if (!/^https?:$/i.test(window.location.protocol)) return false;
      const host = String(window.location.hostname || "").toLowerCase();
      const localDevPorts = new Set(["3000", "3001", "5500", "5501", "5502", "5173"]);
      if ((host === "localhost" || host === "127.0.0.1") && localDevPorts.has(String(window.location.port || ""))) {
        return false;
      }
      return true;
    }

    function resolvePortalPath(role) {
      if (shouldUseRoutePaths()) {
        return role === "admin" ? adminPortalRoute : userPortalRoute;
      }
      return role === "admin" ? adminPortalPath : userPortalPath;
    }

    function hasValidSession() {
      let authFlag = false;
      try {
        authFlag = localStorage.getItem(AUTH_FLAG_KEY) === "true" || sessionStorage.getItem(AUTH_FLAG_KEY) === "true";
      } catch (_error) {
        authFlag = false;
      }
      if (!authFlag) return false;

      const token = getStoredToken();
      if (!token) return false;

      const payload = decodeJwtPayload(token);
      if (!payload) return false;
      if (typeof payload.exp === "number" && payload.exp * 1000 <= Date.now()) return false;
      return true;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 6500) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    }

    async function detectApiBase() {
      const normalizedCandidates = buildApiCandidates();
      for (const candidate of normalizedCandidates) {
        try {
          const response = await fetchWithTimeout(`${candidate}/health`, { method: "GET" }, 3500);
          if (!response.ok) continue;
          activeApiBase = candidate;
          return candidate;
        } catch (_error) {
          // Try the next internal endpoint candidate.
        }
      }
      activeApiBase = "";
      return "";
    }

    async function apiRequest(path, body) {
      const base = activeApiBase || (await detectApiBase());
      if (!base) {
        throw new Error("Service unavailable. Start backend server with: npm start");
      }

      const response = await fetchWithTimeout(`${base}${path}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      }, 8500);

      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.error || payload.message || "Authentication failed.");
      }

      return payload;
    }

    function saveAuthSession({ token, username, role }) {
      const store = localStorage;
      const otherStore = sessionStorage;

      otherStore.removeItem(AUTH_FLAG_KEY);
      otherStore.removeItem(AUTH_TOKEN_KEY);
      otherStore.removeItem(AUTH_EMAIL_KEY);
      otherStore.removeItem(AUTH_ROLE_KEY);

      store.setItem(AUTH_FLAG_KEY, "true");
      store.setItem(AUTH_TOKEN_KEY, token);
      store.setItem(AUTH_EMAIL_KEY, username);
      store.setItem(AUTH_ROLE_KEY, role);
    }

    function updateModeUi() {
      if (signupMode) {
        phoneRow.classList.remove("hidden");
        submitBtn.textContent = "Sign Up";
        subtitleEl.textContent = "Create your secure TrafficAI account.";
        togglePrefixEl.textContent = "Already have an account?";
        toggleBtn.textContent = "Login";
      } else {
        phoneRow.classList.add("hidden");
        submitBtn.textContent = "Login";
        subtitleEl.textContent = "Sign in for secure route intelligence.";
        togglePrefixEl.textContent = "New to TrafficAI?";
        toggleBtn.textContent = "Sign Up";
      }
      setStatus("Use your credentials to continue.");
    }

    async function handleSubmit() {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      const phone = phoneInput.value.trim();

      if (!username || !password) {
        setStatus("Enter username and password.", "error");
        return;
      }

      if (signupMode) {
        if (!phone) {
          setStatus("Enter phone number for signup.", "error");
          return;
        }
      }

      submitBtn.disabled = true;
      submitBtn.textContent = signupMode ? "Creating Account..." : "Signing In...";

      try {
        const payload = signupMode
          ? await apiRequest("/auth/signup", { username, password, phone })
          : await apiRequest("/auth/login", { username, password });

        if (!payload.token || !payload.role) {
          throw new Error("Unexpected authentication response.");
        }

        saveAuthSession({ token: payload.token, username: payload.user?.username || username, role: payload.role });
        setStatus(signupMode ? "Signup successful. Redirecting..." : "Login successful. Redirecting...", "success");

        window.location.href = resolvePortalPath(payload.role);
      } catch (error) {
        setStatus(error.message || "Unable to continue.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = signupMode ? "Sign Up" : "Login";
      }
    }

    toggleBtn.addEventListener("click", () => {
      signupMode = !signupMode;
      updateModeUi();
    });

    submitBtn.addEventListener("click", () => {
      void handleSubmit();
    });

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        void handleSubmit();
      }
    });

    usernameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        void handleSubmit();
      }
    });

    phoneInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        void handleSubmit();
      }
    });

    forgotLink.addEventListener("click", (event) => {
      event.preventDefault();
      setStatus("Password reset is managed by admin support. Contact support@trafficai.local.", "info");
    });

    if (hasValidSession()) {
      const role = getRoleFromStorage() || (decodeJwtPayload(getStoredToken())?.role || "user").toLowerCase();
      window.location.href = resolvePortalPath(role === "admin" ? "admin" : "user");
    }

    updateModeUi();
    void detectApiBase();
  </script>
</body>
</html>
